<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="" />
  <title>Thank You - Wedding Gift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --blue: #121d6c; --paper: #fffdf6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--blue); font-family: "Playfair Display", serif; color: var(--blue);
    }
    .card {
      background: rgba(255,253,246,0.96); border-radius: 24px; padding: 48px 40px;
      max-width: 560px; width: calc(100% - 32px); text-align: center; box-shadow: 0 28px 90px rgba(0,0,0,0.34);
    }
    h1 { font-family: "Anton", sans-serif; font-size: 36px; line-height: 1.1; margin-bottom: 14px; }
    p { font-size: 16px; line-height: 1.5; color: #3a3a3a; margin-bottom: 12px; }
    .meta { font-size: 13px; color: #777; margin-top: 24px; padding-top: 20px; border-top: 1px solid #e0d6c2; }
    .meta strong { color: var(--blue); }
    .button {
      display: inline-flex; align-items: center; justify-content: center;
      height: 44px; padding: 0 28px; border: 2px solid var(--blue); border-radius: 1000px;
      background: var(--blue); color: rgba(255,253,246,0.96);
      font: 400 14px/1 "Playfair Display", serif; text-decoration: none;
      margin-top: 20px; transition: opacity .18s;
    }
    .button:hover { opacity: 0.88; }
    .spinner {
      display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #statusText { font-weight: 500; }
  </style>
</head>
<body>
  <main class="card">
    <h1 id="headline">Your contribution is being confirmed</h1>
    <p id="message">We are waiting for the payment gateway to finalize your contribution. Please wait a moment.</p>
    <div id="meta" class="meta hidden"></div>
    <a class="button" href="/">Return to invitation</a>
  </main>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var contributionId = params.get("contributionId") || params.get("refno") || "";
      var status = params.get("status") || "";
      var ref = params.get("reference") || "";
      var billId = params.get("billplz[id]") || "";
      var headline = document.getElementById("headline");
      var message = document.getElementById("message");
      var meta = document.getElementById("meta");

      function showState(finalStatus) {
        if (finalStatus === "paid") {
          headline.textContent = "Thank you for your generous gift";
          message.textContent = "Your contribution has been confirmed and will appear in our records.";
        } else if (finalStatus === "failed") {
          headline.textContent = "Payment was not completed";
          message.textContent = "This payment was canceled or did not complete. You may return to the invitation and try again.";
        } else {
          headline.textContent = "Your contribution is being confirmed";
          message.innerHTML = '<span class="spinner"></span> We are waiting for the payment gateway callback...';
          return false;
        }
        return true;
      }

      if (contributionId) {
        meta.classList.remove("hidden");
        meta.innerHTML = '<p>Contribution reference: <strong>' + contributionId + '</strong></p>' + (ref ? '<p>Payment reference: <strong>' + ref + '</strong></p>' : '');
      }

      if (status === "completed" || status === "paid" || status === "success") {
        showState("paid");
      } else if (status === "failed" || status === "cancelled") {
        showState("failed");
      } else {
        var attempts = 0;
        var maxAttempts = 8;
        function pollStatus() {
          if (!contributionId) return;
          attempts += 1;
          fetch("/api/contributions/status/" + encodeURIComponent(contributionId))
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (!data) return;
              if (data.status === "paid" || data.status === "failed") {
                showState(data.status);
                if (data.paymentReference && !ref) {
                  ref = data.paymentReference;
                  meta.classList.remove("hidden");
                  meta.innerHTML = '<p>Contribution reference: <strong>' + contributionId + '</strong></p><p>Payment reference: <strong>' + ref + '</strong></p>';
                }
                return;
              }
              if (attempts < maxAttempts) setTimeout(pollStatus, 3000);
            })
            .catch(function() {
              if (attempts < maxAttempts) setTimeout(pollStatus, 3000);
            });
        }
        pollStatus();
      }
    })();
  </script>
</body>
</html>
